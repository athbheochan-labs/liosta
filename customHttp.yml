customHeaders:
  - pattern: '**/*'
    headers:
      - key: Strict-Transport-Security
        value: max-age=31536000; includeSubDomains; preload
      - key: X-Content-Type-Options
        value: nosniff
      - key: Referrer-Policy
        value: strict-origin-when-cross-origin
      - key: Permissions-Policy
        value: geolocation=(), microphone=(), camera=()
  - pattern: '/_app/immutable/**/*'
    headers:
      - key: Cache-Control
        value: public, max-age=31536000, immutable
  - pattern: '/icons/**/*'
    headers:
      - key: Cache-Control
        value: public, max-age=31536000, immutable
  - pattern: '/favicon*'
    headers:
      - key: Cache-Control
        value: public, max-age=31536000, immutable
  - pattern: '/apple-touch-icon.png'
    headers:
      - key: Cache-Control
        value: public, max-age=31536000, immutable
  - pattern: '/manifest.webmanifest'
    headers:
      - key: Cache-Control
        value: public, max-age=3600
  - pattern: '/registerSW.js'
    headers:
      - key: Cache-Control
        value: no-cache
  - pattern: '/sw.js'
    headers:
      - key: Cache-Control
        value: no-cache
